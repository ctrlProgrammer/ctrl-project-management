name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Install GTK4 development libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libgtk-4-1

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release

      - name: cargo clippy
        run: cargo clippy
